<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meşhur Börekçilik | Dijital Menü</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TEZGAH BAŞLANGIÇ EKRANI (Servis Sağlayıcı) -->
    <div id="loader" class="loader tezgah-branding">
        <div class="loader-content">
            <div class="tezgah-logo-wrapper">
                <div class="tezgah-circle">t</div>
                <h1 class="tezgah-text">Tezgah</h1>
            </div>
            <p class="tezgah-sub">Dijital Menü Sistemi</p>
            <div class="progress-bar"><div class="progress"></div></div>
        </div>
    </div>

    <div id="app">
        <!-- BÖREKÇİ HEADER (Müşterinin İşletmesi) -->
        <header class="app-header glass">
            <h1 class="logo-text">Lezzet-i Ala</h1>
            <p class="tagline">Meşhur Börekçilik</p>
        </header>

        <main id="home-view" class="view active">
            <div class="container">
                <div class="hero-section">
                    <h2 class="title">Şubelerimiz</h2>
                    <p class="subtitle">Aşağıdan menüsüne göz atmak istediğiniz şubeyi seçebilirsiniz.</p>
                </div>
                
                <div id="branches-list" class="branches-list"></div>
            </div>
        </main>

        <main id="menu-view" class="view hidden">
            <div class="menu-hero" id="menu-hero">
                <button id="back-button" class="back-btn glass">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    <span>Şubeler</span>
                </button>
                <div class="menu-hero-layer"></div>
                <div class="menu-hero-content container">
                    <h2 id="menu-branch-name" class="branch-name">Şube Adı</h2>
                    <p id="menu-branch-address" class="branch-address">Adres</p>
                </div>
            </div>

            <div class="container menu-section">
                <div class="categories-scroll" id="categories-container"></div>
                <div id="menu-items" class="menu-items"></div>
            </div>
        </main>

        <footer class="app-footer">
            <p><strong>Lezzet-i Ala Börekçilik</strong></p>
            <p style="font-size: 0.7rem; color: #888; margin-top: 5px;">Powered by <span style="color: #e51937;">t Tezgah</span></p>
        </footer>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
